<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Journey | Anniversary</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --accent: #ff758f;
        --secondary: #ffafbd;
        --bg: #0b0e14;
        --glass: rgba(255, 255, 255, 0.1);
        --border: rgba(255, 255, 255, 0.2);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        cursor: none;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: white;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* --- Background Video --- */
      #video-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: -1;
      }

      /* --- Custom Cursor --- */
      #cursor-dot {
        width: 6px;
        height: 6px;
        background: white;
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
      }

      #cursor-outline {
        width: 35px;
        height: 35px;
        border: 1.5px solid var(--accent);
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* --- Heart Rain --- */
      .bg-heart {
        position: fixed;
        color: rgba(255, 117, 143, 0.3);
        font-size: 20px;
        pointer-events: none;
        z-index: 0;
        animation: heart-fall linear forwards;
      }

      @keyframes heart-fall {
        from {
          transform: translateY(-10vh) rotate(0deg);
        }
        to {
          transform: translateY(110vh) rotate(360deg);
        }
      }

      /* --- Hero Content --- */
      .hero {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 20px;
      }

      .hero h1 {
        font-family: "Dancing Script", cursive;
        font-size: clamp(3.5rem, 12vw, 7rem);
        background: linear-gradient(to right, #ff758f, #ffafbd, #ff758f);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation:
          shine 3s linear infinite,
          float 4s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5));
      }

      @keyframes shine {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      .together-text {
        text-transform: uppercase;
        letter-spacing: 5px;
        font-size: 0.8rem;
        margin-bottom: 30px;
        color: white;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      /* --- Photo Sticker --- */
      .photo-sticker {
        position: absolute;
        top: -40px;
        right: -90px;
        width: 150px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 22px;
        backdrop-filter: blur(12px);
        box-shadow: 0 14px 35px rgba(0, 0, 0, 0.5);
        transform: rotate(10deg);
        animation: photo-float 4s ease-in-out infinite;
      }

      .photo-sticker::before {
        content: "💖";
        position: absolute;
        top: -14px;
        left: -10px;
        font-size: 22px;
      }

      .photo-sticker img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 16px;
        display: block;
      }

      .photo-caption {
        margin-top: 8px;
        font-size: 0.8rem;
        color: #fff;
        font-weight: 600;
      }

      @keyframes photo-float {
        0%,
        100% {
          transform: translateY(0) rotate(10deg);
        }
        50% {
          transform: translateY(-14px) rotate(6deg);
        }
      }

      /* --- Glass Counter --- */
      .counter-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        perspective: 1000px;
        margin-top: 30px;
      }

      .counter-card {
        background: var(--glass);
        backdrop-filter: blur(15px);
        border: 1px solid var(--border);
        padding: 25px 10px;
        border-radius: 24px;
        width: 110px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        transition: all 0.4s ease;
      }

      .counter-card span {
        font-size: 2.2rem;
        font-weight: 700;
        color: white;
        display: block;
      }

      .counter-card p {
        font-size: 0.65rem;
        color: var(--accent);
        font-weight: 700;
        margin-top: 8px;
      }

      /* --- Flying Stickers --- */
      .sticker {
        position: fixed;
        pointer-events: none;
        z-index: 20;
        animation: float-upwards 8s linear forwards;
      }

      .sticker-img {
        width: 90px;
        height: auto;
        filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.4));
      }

      @keyframes float-upwards {
        0% {
          transform: translateY(110vh) translateX(0) rotate(0deg) scale(0.8);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        100% {
          transform: translateY(-20vh) translateX(100px) rotate(360deg)
            scale(1.05);
          opacity: 0;
        }
      }

      /* --- Interaction Burst --- */
      .burst {
        position: absolute;
        pointer-events: none;
        animation: burst-move 0.8s ease-out forwards;
        z-index: 9999;
        font-weight: bold;
      }

      @keyframes burst-move {
        0% {
          transform: translate(-50%, -50%) scale(0.5);
          opacity: 1;
        }
        100% {
          transform: translate(var(--tx), var(--ty)) scale(1.5);
          opacity: 0;
        }
      }

      /* --- Music Controller --- */
      #music-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: var(--glass);
        border: 1px solid var(--border);
        color: white;
        padding: 12px;
        border-radius: 50%;
        backdrop-filter: blur(10px);
        cursor: pointer;
        z-index: 1000;
        font-size: 18px;
      }

      @media (max-width: 600px) {
        .counter-grid {
          grid-template-columns: repeat(2, 1fr);
          justify-items: center;
        }
        .counter-card {
          width: 140px;
        }
        #cursor-dot,
        #cursor-outline {
          display: none;
        }
        * {
          cursor: auto;
        }
      }
    </style>
  </head>
  <body>
    <video autoplay muted loop playsinline id="video-bg">
      <source src="bg.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>

    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <button id="music-btn" onclick="toggleMusic()">🎵</button>

    <audio id="bg-audio" loop>
      <source src="11.mp4" type="audio/mpeg" />
    </audio>

    <section class="hero">
      <p class="together-text">Forever & Always</p>
      <h1 id="title">Happy Anniversary</h1>

      <div class="photo-sticker">
        <img src="1.jpg" alt="Our photo" />
        <div class="photo-caption">My Love ✨</div>
      </div>

      <div class="counter-grid">
        <div class="counter-card">
          <span id="days">00</span>
          <p>DAYS</p>
        </div>
        <div class="counter-card">
          <span id="hours">00</span>
          <p>HOURS</p>
        </div>
        <div class="counter-card">
          <span id="mins">00</span>
          <p>MINS</p>
        </div>
        <div class="counter-card">
          <span id="secs">00</span>
          <p>SECS</p>
        </div>
      </div>
    </section>

    <script>
      const startDate = new Date("2023-01-01T00:00:00").getTime();
      const audio = document.getElementById("bg-audio");
      let musicStarted = false;

      // 1. Music Logic: Play on ANY click on the document
      document.addEventListener("click", () => {
        if (!musicStarted) {
          audio.play();
          document.getElementById("music-btn").innerText = "⏸️";
          musicStarted = true;
        }
      });

      function toggleMusic() {
        // This still allows the button to pause/play after it has started
        if (audio.paused) {
          audio.play();
          document.getElementById("music-btn").innerText = "⏸️";
        } else {
          audio.pause();
          document.getElementById("music-btn").innerText = "🎵";
        }
      }

      function updateTimer() {
        const now = new Date().getTime();
        const diff = now - startDate;
        document.getElementById("days").innerText = Math.floor(
          diff / (1000 * 60 * 60 * 24),
        );
        document.getElementById("hours").innerText = Math.floor(
          (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        )
          .toString()
          .padStart(2, "0");
        document.getElementById("mins").innerText = Math.floor(
          (diff % (1000 * 60 * 60)) / (1000 * 60),
        )
          .toString()
          .padStart(2, "0");
        document.getElementById("secs").innerText = Math.floor(
          (diff % (1000 * 60)) / 1000,
        )
          .toString()
          .padStart(2, "0");
      }
      setInterval(updateTimer, 1000);
      updateTimer();

      const dot = document.getElementById("cursor-dot");
      const outline = document.getElementById("cursor-outline");
      document.addEventListener("mousemove", (e) => {
        dot.style.left = e.clientX + "px";
        dot.style.top = e.clientY + "px";
        outline.style.left = e.clientX - 17 + "px";
        outline.style.top = e.clientY - 17 + "px";
      });

      // 2. Burst Logic (Hearts + Love text)
      document.addEventListener("click", (e) => {
        const symbols = ["❤️", "💖", "✨", "Love"];
        for (let i = 0; i < 12; i++) {
          const burst = document.createElement("div");
          burst.className = "burst";
          burst.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
          burst.style.left = e.clientX + "px";
          burst.style.top = e.clientY + "px";
          burst.style.color = i % 2 === 0 ? "#ff758f" : "#ffafbd";
          burst.style.setProperty("--tx", (Math.random() - 0.5) * 300 + "px");
          burst.style.setProperty("--ty", (Math.random() - 0.5) * 300 + "px");
          document.body.appendChild(burst);
          setTimeout(() => burst.remove(), 800);
        }
      });

      const stickerImages = [
        "https://s3.getstickerpack.com/storage/uploads/sticker-pack/dudu2/sticker_11.gif?1c0b8afeae78b0ee6ee1cbd70d49705e",
        "https://s3.getstickerpack.com/storage/uploads/sticker-pack/dudu2/sticker_1.gif?1c0b8afeae78b0ee6ee1cbd70d49705e",
        "https://s3.getstickerpack.com/storage/uploads/sticker-pack/dudu2/sticker_13.gif?1c0b8afeae78b0ee6ee1cbd70d49705e",
      ];

      function createSticker() {
        const sticker = document.createElement("div");
        sticker.className = "sticker";
        const img = document.createElement("img");
        img.src =
          stickerImages[Math.floor(Math.random() * stickerImages.length)];
        img.className = "sticker-img";
        sticker.appendChild(img);
        sticker.style.left = Math.random() * 100 + "vw";
        sticker.style.animationDuration = Math.random() * 5 + 7 + "s";
        document.body.appendChild(sticker);
        setTimeout(() => sticker.remove(), 12000);
      }

      function createBGHeart() {
        const h = document.createElement("div");
        h.className = "bg-heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = Math.random() * 10 + 10 + "px";
        h.style.animationDuration = Math.random() * 5 + 10 + "s";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 15000);
      }

      setInterval(createSticker, 2000);
      setInterval(createBGHeart, 500);
    </script>
  </body>
</html>

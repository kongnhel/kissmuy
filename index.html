<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Our Journey | Anniversary</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --accent: #ff758f;
        --secondary: #ffafbd;
        --bg: #0b0e14;
        --glass: rgba(255, 255, 255, 0.1);
        --border: rgba(255, 255, 255, 0.2);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: white;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: none;
      }

      /* --- Background Video --- */
      #video-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: -1;
      }

      /* --- Custom Cursor (Hidden on Mobile) --- */
      #cursor-dot,
      #cursor-outline {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
      }
      #cursor-dot {
        width: 6px;
        height: 6px;
        background: white;
      }
      #cursor-outline {
        width: 35px;
        height: 35px;
        border: 1.5px solid var(--accent);
        transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* --- Heart Rain --- */
      .bg-heart {
        position: fixed;
        color: rgba(255, 117, 143, 0.3);
        font-size: 20px;
        pointer-events: none;
        z-index: 0;
        animation: heart-fall linear forwards;
      }

      @keyframes heart-fall {
        from {
          transform: translateY(-10vh) rotate(0deg);
        }
        to {
          transform: translateY(110vh) rotate(360deg);
        }
      }

      /* --- Hero Content --- */
      .hero {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 20px;
        width: 100%;
        max-width: 600px;
      }

      .hero h1 {
        font-family: "Dancing Script", cursive;
        font-size: clamp(2.8rem, 10vw, 6rem);
        background: linear-gradient(to right, #ff758f, #ffafbd, #ff758f);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation:
          shine 3s linear infinite,
          float 4s ease-in-out infinite;
        filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.5));
        margin-bottom: 10px;
      }

      @keyframes shine {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .together-text {
        text-transform: uppercase;
        letter-spacing: 4px;
        font-size: 0.7rem;
        margin-bottom: 20px;
        opacity: 0.8;
      }

      /* --- Responsive Photo Sticker --- */
      .photo-sticker {
        position: relative;
        margin: 20px auto 40px;
        width: 130px;
        padding: 8px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid var(--border);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        transform: rotate(-3deg);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .photo-sticker img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 14px;
      }

      .photo-caption {
        margin-top: 5px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      /* --- Counter Grid --- */
      .counter-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-top: 20px;
      }

      .counter-card {
        background: var(--glass);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        padding: 15px 5px;
        border-radius: 18px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      .counter-card span {
        font-size: 1.5rem;
        font-weight: 700;
        display: block;
      }

      .counter-card p {
        font-size: 0.55rem;
        color: var(--accent);
        font-weight: 700;
        margin-top: 4px;
      }

      /* --- Interaction Burst --- */
      .burst {
        position: absolute;
        pointer-events: none;
        animation: burst-move 0.8s ease-out forwards;
        z-index: 9999;
      }

      @keyframes burst-move {
        0% {
          transform: translate(-50%, -50%) scale(0.5);
          opacity: 1;
        }
        100% {
          transform: translate(var(--tx), var(--ty)) scale(1.2);
          opacity: 0;
        }
      }

      /* --- Music Controller --- */
      #music-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--glass);
        border: 1px solid var(--border);
        color: white;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        backdrop-filter: blur(10px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* --- MOBILE ADJUSTMENTS --- */
      @media (max-width: 600px) {
        body {
          cursor: auto;
        }
        #cursor-dot,
        #cursor-outline {
          display: none;
        }
        .counter-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 15px;
        }
        .counter-card {
          padding: 20px 10px;
        }
        .counter-card span {
          font-size: 1.8rem;
        }
        .photo-sticker {
          transform: rotate(3deg);
          margin-bottom: 30px;
        }
      }

      /* --- Flying Stickers --- */
      .sticker {
        position: fixed;
        pointer-events: none;
        z-index: 20;
        animation: float-upwards 8s linear forwards;
      }
      .sticker-img {
        width: 70px;
        height: auto;
        filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
      }
      @keyframes float-upwards {
        0% {
          transform: translateY(110vh) scale(0.8);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        100% {
          transform: translateY(-20vh) translateX(50px) rotate(360deg) scale(1);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <video autoplay muted loop playsinline id="video-bg">
      <source src="bg.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>

    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <button
      id="music-btn"
      onclick="
        event.stopPropagation();
        toggleMusic();
      "
    >
      🎵
    </button>

    <audio id="bg-audio" loop>
      <source src="11.mp4" type="audio/mpeg" />
    </audio>

    <section class="hero">
      <p class="together-text">Forever & Always</p>
      <h1 id="title">Happy Anniversary</h1>

      <div class="photo-sticker">
        <img src="1.jpg" alt="Our photo" />
        <div class="photo-caption">My Love ✨</div>
      </div>

      <div class="counter-grid">
        <div class="counter-card">
          <span id="days">00</span>
          <p>DAYS</p>
        </div>
        <div class="counter-card">
          <span id="hours">00</span>
          <p>HOURS</p>
        </div>
        <div class="counter-card">
          <span id="mins">00</span>
          <p>MINS</p>
        </div>
        <div class="counter-card">
          <span id="secs">00</span>
          <p>SECS</p>
        </div>
      </div>
    </section>

    <script>
      const startDate = new Date("2023-01-01T00:00:00").getTime();
      const audio = document.getElementById("bg-audio");
      let musicStarted = false;

      // Start music on first click/touch anywhere
      const handleInteraction = (e) => {
        if (!musicStarted) {
          audio.play();
          document.getElementById("music-btn").innerText = "⏸️";
          musicStarted = true;
        }
        createBurst(e.touches ? e.touches[0] : e);
      };

      document.addEventListener("click", handleInteraction);
      document.addEventListener("touchstart", handleInteraction);

      function toggleMusic() {
        if (audio.paused) {
          audio.play();
          document.getElementById("music-btn").innerText = "⏸️";
        } else {
          audio.pause();
          document.getElementById("music-btn").innerText = "🎵";
        }
      }

      function updateTimer() {
        const now = new Date().getTime();
        const diff = now - startDate;
        document.getElementById("days").innerText = Math.floor(
          diff / (1000 * 60 * 60 * 24),
        );
        document.getElementById("hours").innerText = Math.floor(
          (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        )
          .toString()
          .padStart(2, "0");
        document.getElementById("mins").innerText = Math.floor(
          (diff % (1000 * 60 * 60)) / (1000 * 60),
        )
          .toString()
          .padStart(2, "0");
        document.getElementById("secs").innerText = Math.floor(
          (diff % (1000 * 60)) / 1000,
        )
          .toString()
          .padStart(2, "0");
      }
      setInterval(updateTimer, 1000);
      updateTimer();

      // Cursor movement
      const dot = document.getElementById("cursor-dot");
      const outline = document.getElementById("cursor-outline");
      document.addEventListener("mousemove", (e) => {
        dot.style.left = e.clientX + "px";
        dot.style.top = e.clientY + "px";
        outline.style.left = e.clientX - 17 + "px";
        outline.style.top = e.clientY - 17 + "px";
      });

      function createBurst(pos) {
        const symbols = ["❤️", "💖", "✨", "Love"];
        for (let i = 0; i < 8; i++) {
          const burst = document.createElement("div");
          burst.className = "burst";
          burst.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
          burst.style.left = pos.clientX + "px";
          burst.style.top = pos.clientY + "px";
          burst.style.setProperty("--tx", (Math.random() - 0.5) * 200 + "px");
          burst.style.setProperty("--ty", (Math.random() - 0.5) * 200 + "px");
          document.body.appendChild(burst);
          setTimeout(() => burst.remove(), 800);
        }
      }

      const stickerImages = [
        "https://s3.getstickerpack.com/storage/uploads/sticker-pack/dudu2/sticker_11.gif?1c0b8afeae78b0ee6ee1cbd70d49705e",
        "https://s3.getstickerpack.com/storage/uploads/sticker-pack/dudu2/sticker_1.gif?1c0b8afeae78b0ee6ee1cbd70d49705e",
        "https://s3.getstickerpack.com/storage/uploads/sticker-pack/dudu2/sticker_13.gif?1c0b8afeae78b0ee6ee1cbd70d49705e",
      ];

      function createSticker() {
        const sticker = document.createElement("div");
        sticker.className = "sticker";
        const img = document.createElement("img");
        img.src =
          stickerImages[Math.floor(Math.random() * stickerImages.length)];
        img.className = "sticker-img";
        sticker.appendChild(img);
        sticker.style.left = Math.random() * 90 + "vw";
        document.body.appendChild(sticker);
        setTimeout(() => sticker.remove(), 8000);
      }

      function createBGHeart() {
        const h = document.createElement("div");
        h.className = "bg-heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        h.style.animationDuration = Math.random() * 5 + 8 + "s";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 10000);
      }

      setInterval(createSticker, 3000);
      setInterval(createBGHeart, 600);
    </script>
  </body>
</html>
